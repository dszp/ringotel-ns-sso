# CI — typecheck + tests on every push/PR.
#
# Actions are pinned to commit SHAs, not tags. A tag is mutable: whoever controls the action repo can
# repoint it at new code, and that code runs in this workflow. Pinning to a SHA means an update is a
# reviewable change here rather than something that happens silently. The trailing comment records which
# version each SHA corresponds to, so upgrades stay legible.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
